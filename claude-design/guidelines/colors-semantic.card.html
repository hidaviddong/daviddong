<!-- @dsCard group="Colors" viewport="700x150" subtitle="Apple system semantic hues" name="Semantic States" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);display:flex;gap:10px;padding:16px;box-sizing:border-box;height:150px;background:var(--surface-window);}
  .chip{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:10px;font-size:12px;border-radius:var(--radius-md);}
</style></head>
<body>
  <div class="chip" style="background:var(--state-success-bg);color:var(--state-success)">success<br>--state-success</div>
  <div class="chip" style="background:var(--state-warning-bg);color:var(--state-warning)">warning<br>--state-warning</div>
  <div class="chip" style="background:var(--state-danger-bg);color:var(--state-danger)">danger<br>--state-danger</div>
  <div class="chip" style="background:var(--gray-200);color:var(--text-primary)">info<br>--gray-200</div>
</body>
</html>
