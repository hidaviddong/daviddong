<!-- @dsCard group="Spacing" viewport="700x120" subtitle="Fixed chrome measures — titlebar, menubar, statusbar, scrollbar" name="Chrome Measures" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:20px;align-items:center;height:120px;padding:0 20px;box-sizing:border-box;background:var(--surface-window);font-family:var(--font-body);font-size:11px;color:var(--text-primary);}
.row{display:flex;flex-direction:column;align-items:center;gap:4px;}
.box{background:var(--accent-500);width:40px;}
</style></head>
<body>
  <div class="row"><div class="box" style="height:var(--titlebar-height)"></div>titlebar 28</div>
  <div class="row"><div class="box" style="height:var(--menubar-height)"></div>menubar 24</div>
  <div class="row"><div class="box" style="height:var(--statusbar-height)"></div>statusbar 22</div>
  <div class="row"><div class="box" style="height:var(--scrollbar-size)"></div>scrollbar 16</div>
</body>
</html>
