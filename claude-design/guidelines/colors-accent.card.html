<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);display:flex;height:150px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-size:11px;color:#fff;}
  .label{background:rgba(0,0,0,0.35);padding:2px 4px;width:fit-content;}
</style></head>
<body>
  <div class="sw" style="background:var(--accent-100);color:#000;"><span class="label" style="background:rgba(255,255,255,0.5)">--accent-100</span></div>
  <div class="sw" style="background:var(--accent-300)"><span class="label">--accent-300</span></div>
  <div class="sw" style="background:var(--accent-500)"><span class="label">--accent-500 (primary)</span></div>
  <div class="sw" style="background:var(--accent-700)"><span class="label">--accent-700</span></div>
</body>
</html>
