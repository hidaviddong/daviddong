<!-- @dsCard group="Spacing" viewport="700x140" subtitle="4px-rooted scale, kept intentionally tight for dense chrome" name="Spacing Scale" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;align-items:flex-end;gap:6px;height:140px;padding:20px;box-sizing:border-box;background:var(--surface-window);font-family:var(--font-body);font-size:10px;color:var(--text-secondary);}
.bar{background:var(--accent-500);width:24px;}
.col{display:flex;flex-direction:column;align-items:center;gap:4px;}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:var(--space-2)"></div>2</div>
  <div class="col"><div class="bar" style="height:var(--space-4)"></div>4</div>
  <div class="col"><div class="bar" style="height:var(--space-6)"></div>6</div>
  <div class="col"><div class="bar" style="height:var(--space-8)"></div>8</div>
  <div class="col"><div class="bar" style="height:var(--space-9)"></div>9</div>
  <div class="col"><div class="bar" style="height:var(--space-10)"></div>10</div>
  <div class="col"><div class="bar" style="height:var(--space-11)"></div>11</div>
</body>
</html>
