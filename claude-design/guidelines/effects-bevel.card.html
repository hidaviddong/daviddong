<!-- @dsCard group="Brand" viewport="700x180" subtitle="Glossy raised vs. sunken vs. inset field — the core surface language" name="Surface Treatments" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:24px;align-items:center;justify-content:center;height:180px;background:var(--surface-window);font-family:var(--font-chrome);font-size:14px;color:var(--text-primary);}
.box{width:120px;height:60px;border-radius:var(--radius-pill);display:flex;align-items:center;justify-content:center;background:var(--gray-50);position:relative;overflow:hidden;}
.box span{position:relative;}
.gloss{position:absolute;inset:0;background:var(--gloss-overlay);}
</style></head>
<body>
  <div class="box" style="box-shadow:var(--bevel-raised)"><div class="gloss"></div><span>raised</span></div>
  <div class="box" style="box-shadow:var(--bevel-sunken)"><span>sunken</span></div>
  <div class="box" style="box-shadow:var(--bevel-field);background:#fff;border-radius:var(--radius-md);"><span>field</span></div>
</body>
</html>
