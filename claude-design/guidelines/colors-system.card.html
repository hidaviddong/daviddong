<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);display:flex;height:150px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-size:11px;color:var(--text-primary);}
  .label{background:rgba(255,255,255,0.6);padding:2px 4px;width:fit-content;border-radius:3px;}
</style></head>
<body>
  <div class="sw" style="background:var(--gray-0)"><span class="label">--gray-0</span></div>
  <div class="sw" style="background:var(--gray-50)"><span class="label">--gray-50</span></div>
  <div class="sw" style="background:var(--gray-100)"><span class="label">--gray-100</span></div>
  <div class="sw" style="background:var(--gray-200)"><span class="label">--gray-200</span></div>
  <div class="sw" style="background:var(--gray-300)"><span class="label">--gray-300</span></div>
  <div class="sw" style="background:var(--gray-400)"><span class="label">--gray-400</span></div>
  <div class="sw" style="background:var(--gray-500)"><span class="label" style="color:#fff;background:rgba(0,0,0,0.4)">--gray-500</span></div>
  <div class="sw" style="background:var(--gray-700)"><span class="label" style="color:#fff;background:rgba(0,0,0,0.4)">--gray-700</span></div>
  <div class="sw" style="background:var(--gray-900)"><span class="label" style="color:#fff;background:rgba(0,0,0,0.4)">--gray-900</span></div>
</body>
</html>
