<!-- @dsCard group="Brand" viewport="700x180" subtitle="Soft blurred drop shadow + Aqua-blue glow ring — never hard-edged, never dotted" name="Window Shadow &amp; Focus Ring" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:32px;align-items:center;justify-content:center;height:180px;background:var(--surface-desktop);font-family:var(--font-chrome);font-size:14px;color:var(--text-primary);}
.win{width:150px;height:90px;border-radius:var(--radius-lg);background:var(--gray-50);box-shadow:var(--shadow-window);display:flex;align-items:center;justify-content:center;}
.field{width:150px;height:34px;border-radius:var(--radius-md);background:#fff;box-shadow:var(--bevel-field), var(--focus-ring);display:flex;align-items:center;justify-content:center;}
</style></head>
<body>
  <div class="win">soft shadow</div>
  <div class="field">focus glow</div>
</body>
</html>
