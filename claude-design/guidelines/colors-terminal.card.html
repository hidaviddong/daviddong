<!-- @dsCard group="Colors" viewport="700x150" subtitle="Terminal.app easter egg only — not a global accent" name="Terminal Accent (Scoped)" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--terminal-bg);font-family:var(--font-mono);display:flex;align-items:center;gap:24px;height:150px;padding:0 20px;box-sizing:border-box;}
  .item{color:var(--terminal-green);font-size:13px;}
  .sw{width:60px;height:60px;border-radius:6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.2);}
</style></head>
<body>
  <div class="item"><div class="sw" style="background:var(--terminal-green)"></div>--terminal-green</div>
  <div class="item" style="color:var(--terminal-green-dim)"><div class="sw" style="background:var(--terminal-green-dim)"></div>--terminal-green-dim</div>
  <div class="item" style="color:var(--terminal-amber)"><div class="sw" style="background:var(--terminal-amber)"></div>--terminal-amber</div>
  <div style="color:var(--terminal-green);font-size:18px;">david@hidaviddong ~ % _</div>
</body>
</html>
