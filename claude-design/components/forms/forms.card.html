<!-- @dsCard group="Components" viewport="700x520" name="Forms" subtitle="Button, Input, Select, Checkbox, Radio, Switch, Slider" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-window);padding:16px;box-sizing:border-box;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Input, Textarea, Label, Checkbox, RadioGroup, Switch, Select, Slider } = window.HidaviddongDesignSystem_9acf6c;

function Demo() {
  const [checked, setChecked] = React.useState(true);
  const [radio, setRadio] = React.useState("icons");
  const [on, setOn] = React.useState(true);
  const [sel, setSel] = React.useState("name");
  const [vol, setVol] = React.useState(60);
  return (
    <div style={{display:"flex", flexDirection:"column", gap:14, fontFamily:"var(--font-body)"}}>
      <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
        <Button variant="default">Default</Button>
        <Button variant="primary">Primary</Button>
        <Button variant="outline">Outline</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="destructive">Delete</Button>
        <Button variant="link">Link</Button>
        <Button variant="default" disabled>Disabled</Button>
      </div>
      <div style={{display:"flex", gap:12, alignItems:"flex-end", flexWrap:"wrap"}}>
        <div><Label>Username</Label><Input placeholder="hidaviddong" /></div>
        <div style={{width:200}}><Label>Sort by</Label><Select value={sel} onChange={setSel} options={[{value:"name",label:"Name"},{value:"date",label:"Date"}]} /></div>
      </div>
      <div><Label>Notes</Label><Textarea rows={2} placeholder="type here..." /></div>
      <div style={{display:"flex", gap:20, alignItems:"center", flexWrap:"wrap"}}>
        <Checkbox checked={checked} onChange={(e)=>setChecked(e.target.checked)} label="Remember me" />
        <RadioGroup name="viewmode" value={radio} onChange={setRadio} options={[{value:"icons",label:"Icons"},{value:"list",label:"List"}]} />
        <Switch checked={on} onChange={setOn} />
      </div>
      <div style={{width:260}}><Label>Volume</Label><Slider value={vol} onChange={setVol} /></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
