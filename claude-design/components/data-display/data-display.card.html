<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-window);padding:16px;box-sizing:border-box;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Card, Table, Avatar, Kbd, Separator, Toggle, ToggleGroup } = window.HidaviddongDesignSystem_9acf6c;
function Demo(){
  const [align, setAlign] = React.useState("left");
  return (
    <div style={{display:"flex", flexDirection:"column", gap:14}}>
      <div style={{display:"flex", gap:12, alignItems:"center"}}>
        <Avatar fallback="D" />
        <Kbd>Ctrl</Kbd><Kbd>Alt</Kbd><Kbd>Del</Kbd>
        <Toggle pressed={true}>B</Toggle>
        <ToggleGroup value={align} onChange={setAlign} options={[{value:"left",label:"◀"},{value:"center",label:"■"},{value:"right",label:"▶"}]} />
      </div>
      <Separator />
      <Card title="Properties" footer="Last modified: 3/6/99">
        <div style={{fontSize:14}}>General file properties go here.</div>
      </Card>
      <Table columns={[{key:"name",label:"Name"},{key:"size",label:"Size"}]} rows={[{name:"readme.txt",size:"2KB"},{name:"setup.exe",size:"340KB"}]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
