<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-window);padding:16px;box-sizing:border-box;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Tooltip, Popover, DropdownMenu, WindowFrame, Dialog } = window.HidaviddongDesignSystem_9acf6c;
function Demo(){
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{display:"flex", flexDirection:"column", gap:16}}>
      <div style={{display:"flex", gap:16, alignItems:"center"}}>
        <Tooltip label="Delete this file"><Button size="icon">🗑</Button></Tooltip>
        <Popover trigger={<Button>Options ▾</Button>}><div style={{fontSize:14}}>Panel content…</div></Popover>
        <DropdownMenu trigger={<Button>File ▾</Button>} items={[{label:"New"},{label:"Open"},{separator:true},{label:"Delete", danger:true}]} />
        <Button variant="primary" onClick={()=>setOpen(true)}>Open Dialog</Button>
      </div>
      <WindowFrame title="My Computer" icon="💾" footer="3 objects, 1.2MB free" width={300}>
        <div style={{fontSize:14}}>C:\ Program Files\</div>
      </WindowFrame>
      <Dialog open={open} title="Delete file?" onClose={()=>setOpen(false)} footer={<div style={{display:"flex",gap:8}}><Button variant="destructive" onClick={()=>setOpen(false)}>Delete</Button><Button variant="outline" onClick={()=>setOpen(false)}>Cancel</Button></div>}>
        <div style={{fontSize:14}}>This cannot be undone.</div>
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
